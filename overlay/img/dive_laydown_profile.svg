<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#556b2f"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">DIVE LAYDOWN (DL) - ATTACK PROFILE</text>
  <!-- Ground -->
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- Target -->
  <g transform="translate(520,295)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#8b0000" stroke-width="2"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#8b0000" stroke-width="2"/><circle cx="0" cy="0" r="8" stroke="#8b0000" stroke-width="1.5" fill="none"/><circle cx="0" cy="0" r="3" fill="#8b0000"/><text x="0" y="28" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="11" fill="#8b0000" letter-spacing="1">TARGET</text></g>
  <!-- Ingress (level, dashed) -->
  <line x1="60" y1="80" x2="180" y2="80" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="85" y="68" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">INGRESS</text>
  <!-- Aircraft at start of dive -->
  <g transform="translate(195,75)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Steep dive path -->
  <line x1="210" y1="80" x2="310" y2="255" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Dive angle annotation -->
  <path d="M 230 80 A 35 35 0 0 1 240 105" stroke="#556b2f" stroke-width="1.5" fill="none"/>
  <text x="248" y="105" font-family="Courier New,monospace" font-size="10" fill="#556b2f" font-weight="bold">STEEP DIVE</text>
  <!-- Radar beam cone during dive -->
  <polygon points="280,220 500,290 530,290" fill="rgba(74,55,40,0.10)" stroke="#4a3728" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="460" y="270" font-family="Courier New,monospace" font-size="8.5" fill="#4a3728" font-weight="bold">RADAR</text>
  <text x="460" y="281" font-family="Courier New,monospace" font-size="8.5" fill="#4a3728" font-weight="bold">LOCK</text>
  <!-- Level-off transition arc -->
  <path d="M 310 255 Q 330 280 360 275" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- LEVEL OFF annotation -->
  <g transform="translate(325,248)"><line x1="0" y1="15" x2="0" y2="30" stroke="#556b2f" stroke-width="1"/><text x="0" y="44" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">LEVEL OFF</text></g>
  <!-- Level flight at low alt -->
  <line x1="360" y1="275" x2="490" y2="275" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Aircraft symbol at level flight -->
  <g transform="translate(420,270)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Release point -->
  <g transform="translate(490,275)"><circle cx="0" cy="0" r="5" fill="#556b2f"/></g>
  <!-- Release range arrow (from target back to release point) -->
  <line x1="490" y1="295" x2="520" y2="295" stroke="#8b0000" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <line x1="520" y1="290" x2="520" y2="300" stroke="#8b0000" stroke-width="1"/>
  <line x1="490" y1="290" x2="490" y2="300" stroke="#8b0000" stroke-width="1"/>
  <!-- Auto release annotation -->
  <line x1="490" y1="268" x2="490" y2="240" stroke="#556b2f" stroke-width="1"/>
  <text x="493" y="237" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">AUTO RELEASE</text>
  <text x="493" y="248" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">AT SET RANGE</text>
  <!-- Bomb trajectory -->
  <path d="M 490 280 Q 505 290 515 305" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-r)"/>
  <ellipse cx="505" cy="290" rx="3" ry="5" fill="#8b0000" transform="rotate(30,505,290)"/>
  <!-- Egress -->
  <line x1="505" y1="275" x2="680" y2="200" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="650" y="190" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">EGRESS</text>
  <!-- Altitude annotation (left side) -->
  <line x1="80" y1="80" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="80" x2="85" y2="80" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="200" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,200)">8,000-12,000 FT AGL</text>
  <!-- Low altitude annotation -->
  <line x1="360" y1="275" x2="360" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="370" y="305" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">LOW ALT</text>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="12" x2="30" y2="12" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="26" x2="30" y2="26" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3"/><text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">BOMB TRAJECTORY</text><polygon points="10,37 20,34 10,40" fill="rgba(74,55,40,0.3)" stroke="#4a3728" stroke-width="0.5"/><text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#4a3728">RADAR BEAM</text></g>
  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>