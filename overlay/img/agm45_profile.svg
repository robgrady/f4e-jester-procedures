<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#556b2f"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">AGM-45 SHRIKE - ATTACK PROFILE</text>
  <!-- Ground -->
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- SAM Radar Emitter on ground -->
  <g transform="translate(500,295)">
    <!-- Emitter symbol (antenna) -->
    <rect x="-8" y="-5" width="16" height="10" fill="#8b0000" stroke="#1a1a1a" stroke-width="1" rx="1"/>
    <line x1="0" y1="-5" x2="0" y2="-15" stroke="#8b0000" stroke-width="2"/>
    <line x1="-6" y1="-15" x2="6" y2="-15" stroke="#8b0000" stroke-width="2"/>
    <text x="0" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="10" fill="#8b0000" letter-spacing="1">RADAR EMITTER</text>
  </g>
  <!-- Radar emission waves from emitter -->
  <path d="M 500 275 Q 480 250 460 220" stroke="#8b0000" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <path d="M 505 272 Q 490 240 475 200" stroke="#8b0000" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <path d="M 510 270 Q 500 230 490 180" stroke="#8b0000" stroke-width="1" fill="none" stroke-dasharray="3,2"/>
  <!-- Wider emission cone -->
  <path d="M 495 275 Q 465 230 440 180" stroke="#8b0000" stroke-width="0.8" fill="none" stroke-dasharray="2,3"/>
  <path d="M 515 268 Q 510 220 510 160" stroke="#8b0000" stroke-width="0.8" fill="none" stroke-dasharray="2,3"/>
  <!-- Emission wave arcs -->
  <path d="M 455 230 A 30 30 0 0 1 500 225" stroke="#8b0000" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M 445 200 A 45 45 0 0 1 510 195" stroke="#8b0000" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 435 170 A 60 60 0 0 1 520 165" stroke="#8b0000" stroke-width="1" fill="none" opacity="0.4"/>
  <text x="535" y="195" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000" font-weight="bold">RADAR</text>
  <text x="535" y="205" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000" font-weight="bold">EMISSIONS</text>
  <!-- Aircraft approach at medium/high altitude -->
  <line x1="60" y1="120" x2="220" y2="120" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="90" y="108" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">INGRESS</text>
  <!-- Aircraft -->
  <g transform="translate(240,115)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Continue flight to launch point -->
  <line x1="255" y1="120" x2="340" y2="120" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Launch envelope box -->
  <g transform="translate(280,58)"><rect x="0" y="0" width="120" height="42" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="6,3"/><text x="60" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">LAUNCH</text><text x="60" y="28" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">ENVELOPE</text><text x="60" y="39" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">10-15 NM</text></g>
  <!-- Missile launch point -->
  <g transform="translate(340,120)"><circle cx="0" cy="0" r="5" fill="#8b0000"/><line x1="5" y1="-5" x2="35" y2="-25" stroke="#8b0000" stroke-width="1"/><text x="38" y="-27" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">MISSILE</text><text x="38" y="-17" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">LAUNCH</text></g>
  <!-- AGM-45 missile trajectory (straight line to emitter) -->
  <line x1="345" y1="122" x2="492" y2="280" stroke="#8b0000" stroke-width="2.5" marker-end="url(#arr-r)"/>
  <!-- Missile symbol along trajectory -->
  <g transform="translate(400,180) rotate(55)">
    <polygon points="-8,0 8,0 6,-2 -6,-2" fill="#8b0000"/>
    <polygon points="8,0 12,-3 12,3" fill="#8b0000"/>
  </g>
  <!-- AGM-45 SHRIKE label along missile path -->
  <text x="440" y="175" font-family="Courier New,monospace" font-size="9" fill="#8b0000" font-weight="bold" transform="rotate(38,440,175)">AGM-45 SHRIKE</text>
  <!-- Break away after launch -->
  <path d="M 350 120 Q 380 115 410 105 Q 450 90 500 80" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" fill="none" marker-end="url(#arr)"/>
  <!-- Break away label -->
  <text x="460" y="72" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">BREAK AWAY</text>
  <!-- Indexer light indicators box -->
  <g transform="translate(100,175)"><rect x="0" y="0" width="140" height="70" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/><text x="70" y="14" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f" font-weight="bold">INDEXER LIGHTS</text>
  <!-- Pull-up indicator -->
  <rect x="12" y="20" width="10" height="10" fill="#556b2f" rx="1"/>
  <text x="30" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f" font-weight="bold">PULL-UP</text>
  <!-- Level indicator -->
  <rect x="12" y="35" width="10" height="10" fill="#3b4a20" rx="1"/>
  <text x="30" y="44" font-family="Courier New,monospace" font-size="7.5" fill="#3b4a20" font-weight="bold">LEVEL (IN RANGE)</text>
  <!-- Dive indicator -->
  <rect x="12" y="50" width="10" height="10" fill="#1a1a1a" rx="1"/>
  <text x="30" y="59" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a" font-weight="bold">DIVE</text>
  </g>
  <!-- Altitude annotation -->
  <line x1="80" y1="120" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="120" x2="85" y2="120" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="220" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,220)">10,000-20,000 FT AGL</text>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="12" x2="30" y2="12" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="26" x2="30" y2="26" stroke="#8b0000" stroke-width="2.5"/><text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">MISSILE PATH</text><path d="M 10 38 A 8 8 0 0 1 30 38" stroke="#8b0000" stroke-width="1" fill="none"/><text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">RADAR EMISSION</text></g>
  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>