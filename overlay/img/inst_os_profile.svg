<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#556b2f"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">INST OVER-THE-SHOULDER (INST O/S) - ATTACK PROFILE</text>
  <!-- Ground -->
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- Target (directly below bomb button press) -->
  <g transform="translate(330,295)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#8b0000" stroke-width="2"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#8b0000" stroke-width="2"/><circle cx="0" cy="0" r="8" stroke="#8b0000" stroke-width="1.5" fill="none"/><circle cx="0" cy="0" r="3" fill="#8b0000"/><text x="0" y="28" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="11" fill="#8b0000" letter-spacing="1">TARGET</text></g>
  <!-- Low level ingress -->
  <line x1="60" y1="275" x2="300" y2="275" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="120" y="262" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">LOW LEVEL FLIGHT</text>
  <!-- Aircraft directly over target -->
  <g transform="translate(330,270)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Bomb button press point (directly over target) -->
  <g transform="translate(330,275)"><circle cx="0" cy="0" r="5" fill="#8b0000"/></g>
  <!-- Dashed line from aircraft to target showing "directly over" -->
  <line x1="330" y1="280" x2="330" y2="290" stroke="#8b0000" stroke-width="1.5" stroke-dasharray="2,2"/>
  <!-- DIRECTLY OVER TARGET annotation -->
  <line x1="335" y1="270" x2="410" y2="240" stroke="#8b0000" stroke-width="1"/>
  <text x="413" y="233" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">DIRECTLY OVER TARGET</text>
  <text x="413" y="244" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">BOMB BUTTON PRESS</text>
  <!-- Immediate 4G Immelmann arc -->
  <!-- Up phase -->
  <path d="M 335 275 Q 355 210 375 130 Q 390 70 400 48" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Over the top -->
  <path d="M 400 48 Q 410 32 425 30 Q 445 30 455 40 Q 465 52 470 70" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Coming down -->
  <path d="M 470 70 Q 480 110 485 145" stroke="#1a1a1a" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <!-- IMMEDIATE 4G IMMELMANN label -->
  <text x="440" y="23" text-anchor="middle" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">IMMEDIATE</text>
  <text x="440" y="35" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">4G IMMELMANN</text>
  <!-- Release angle arc (>90 deg shown from pull-up baseline) -->
  <path d="M 365 275 A 80 80 0 0 0 425 40" stroke="#556b2f" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="400" y="160" font-family="Courier New,monospace" font-size="9" fill="#556b2f" font-weight="bold">&gt;90 DEG</text>
  <!-- Release point past vertical -->
  <g transform="translate(425,42)"><circle cx="0" cy="0" r="5" fill="#556b2f"/></g>
  <line x1="428" y1="48" x2="490" y2="85" stroke="#556b2f" stroke-width="1"/>
  <text x="493" y="83" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">RELEASE AT</text>
  <text x="493" y="94" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">HIGH ANGLE</text>
  <!-- Bomb trajectory rearward to target -->
  <path d="M 420 46 Q 380 60 355 120 Q 340 200 332 290" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-r)"/>
  <ellipse cx="365" cy="100" rx="3" ry="5" fill="#8b0000" transform="rotate(50,365,100)"/>
  <ellipse cx="345" cy="180" rx="3" ry="5" fill="#8b0000" transform="rotate(75,345,180)"/>
  <!-- Weapons toss backward label -->
  <text x="260" y="140" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">WEAPONS TOSS</text>
  <text x="260" y="151" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">BACKWARD</text>
  <!-- Egress on reciprocal heading -->
  <line x1="490" y1="150" x2="540" y2="275" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" fill="none" marker-end="url(#arr)"/>
  <text x="545" y="210" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">EGRESS</text>
  <!-- NO IP/NO TIMER box -->
  <g transform="translate(90,90)"><rect x="0" y="0" width="160" height="40" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/><text x="80" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">NO IP / NO TIMER</text><text x="80" y="28" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">REQUIRED</text></g>
  <!-- Altitude annotation -->
  <line x1="80" y1="275" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="275" x2="85" y2="275" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="297" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,297)">200-500 FT AGL</text>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="30" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="10" x2="30" y2="10" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="13" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="22" x2="30" y2="22" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3"/><text x="35" y="25" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">BOMB TRAJECTORY</text></g>
  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>