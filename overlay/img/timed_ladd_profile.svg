<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#556b2f"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">TIMED LADD (T LAD) - ATTACK PROFILE</text>
  <!-- Ground -->
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- Target (far right - stand-off delivery) -->
  <g transform="translate(600,295)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#8b0000" stroke-width="2"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#8b0000" stroke-width="2"/><circle cx="0" cy="0" r="8" stroke="#8b0000" stroke-width="1.5" fill="none"/><circle cx="0" cy="0" r="3" fill="#8b0000"/><text x="0" y="28" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="11" fill="#8b0000" letter-spacing="1">TARGET</text></g>
  <!-- Low level ingress -->
  <line x1="60" y1="275" x2="155" y2="275" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="70" y="262" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">LOW LEVEL INGRESS</text>
  <!-- IP marker -->
  <g transform="translate(180,310)">
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#556b2f" stroke-width="2"/>
    <polygon points="0,-25 18,-20 0,-15" fill="#556b2f" opacity="0.7" stroke="#556b2f" stroke-width="1"/>
    <text x="22" y="-16" font-family="Courier New,monospace" font-size="10" fill="#556b2f" font-weight="bold">IP</text>
  </g>
  <!-- Level flight from IP (timer) -->
  <line x1="170" y1="275" x2="300" y2="275" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Pull-up timer annotation -->
  <text x="220" y="265" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">PULL-UP TIMER</text>
  <line x1="185" y1="270" x2="255" y2="270" stroke="#556b2f" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Aircraft at pull-up point -->
  <g transform="translate(300,270)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- 3.5G Pull-up annotation -->
  <g transform="translate(300,275)"><circle cx="0" cy="0" r="5" fill="#8b0000"/><line x1="-5" y1="-8" x2="-30" y2="-35" stroke="#8b0000" stroke-width="1"/><text x="-33" y="-38" font-family="Courier New,monospace" font-size="9" fill="#8b0000" font-weight="bold" text-anchor="end">3.5G PULL-UP</text></g>
  <!-- Pull-up arc to 45 deg -->
  <path d="M 305 275 Q 340 220 370 140 Q 385 100 400 70" stroke="#1a1a1a" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <!-- 45 degree reference line from pull-up point -->
  <line x1="300" y1="275" x2="440" y2="135" stroke="#556b2f" stroke-width="1" stroke-dasharray="6,3"/>
  <!-- 45 DEG angle arc -->
  <path d="M 340 275 A 40 40 0 0 0 330 245" stroke="#556b2f" stroke-width="1.5" fill="none"/>
  <text x="350" y="252" font-family="Courier New,monospace" font-size="9" fill="#556b2f" font-weight="bold">45 DEG</text>
  <!-- Release point on the climb -->
  <g transform="translate(385,110)"><circle cx="0" cy="0" r="5" fill="#556b2f"/></g>
  <line x1="390" y1="110" x2="430" y2="100" stroke="#556b2f" stroke-width="1"/>
  <text x="433" y="95" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">RELEASE TIMER</text>
  <text x="433" y="106" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">EXPIRES</text>
  <!-- Bomb high loft trajectory -->
  <path d="M 385 115 Q 440 40 510 50 Q 570 70 595 290" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-r)"/>
  <ellipse cx="460" cy="45" rx="3" ry="5" fill="#8b0000" transform="rotate(-20,460,45)"/>
  <ellipse cx="540" cy="60" rx="3" ry="5" fill="#8b0000" transform="rotate(25,540,60)"/>
  <text x="505" y="38" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#8b0000" font-weight="bold">HIGH LOFT ARC</text>
  <!-- Aircraft at release climbing -->
  <g transform="translate(398,68) rotate(-55)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Escape maneuver -->
  <path d="M 405 63 Q 420 50 440 50 Q 470 55 490 75" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" fill="none" marker-end="url(#arr)"/>
  <text x="498" y="68" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">ESCAPE</text>
  <text x="498" y="78" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">MANEUVER</text>
  <!-- Altitude annotation -->
  <line x1="80" y1="275" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="275" x2="85" y2="275" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="297" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,297)">200-500 FT AGL</text>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="12" x2="30" y2="12" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="26" x2="30" y2="26" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3"/><text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">BOMB TRAJECTORY</text><line x1="10" y1="38" x2="30" y2="38" stroke="#556b2f" stroke-width="1.5"/><polygon points="10,38 18,34 10,40" fill="#556b2f"/><text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">IP MARKER</text></g>
  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>