<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#556b2f"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">TIMED LEVEL (TL) - ATTACK PROFILE</text>
  <!-- Ground -->
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- Target -->
  <g transform="translate(500,295)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#8b0000" stroke-width="2"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#8b0000" stroke-width="2"/><circle cx="0" cy="0" r="8" stroke="#8b0000" stroke-width="1.5" fill="none"/><circle cx="0" cy="0" r="3" fill="#8b0000"/><text x="0" y="28" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="11" fill="#8b0000" letter-spacing="1">TARGET</text></g>
  <!-- Level flight ingress -->
  <line x1="60" y1="180" x2="200" y2="180" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="90" y="168" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">INGRESS (LEVEL)</text>
  <!-- Aircraft -->
  <g transform="translate(215,175)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- IP marker on ground -->
  <g transform="translate(250,310)">
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#556b2f" stroke-width="2"/>
    <polygon points="0,-25 18,-20 0,-15" fill="#556b2f" opacity="0.7" stroke="#556b2f" stroke-width="1"/>
    <text x="22" y="-16" font-family="Courier New,monospace" font-size="10" fill="#556b2f" font-weight="bold">IP</text>
  </g>
  <!-- Bomb button at IP -->
  <g transform="translate(250,180)"><circle cx="0" cy="0" r="5" fill="#8b0000"/><line x1="5" y1="-5" x2="40" y2="-30" stroke="#8b0000" stroke-width="1"/><text x="43" y="-32" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">BOMB BUTTON</text><text x="43" y="-22" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">PRESS AT IP</text></g>
  <!-- Continue straight and level (timer countdown segment) -->
  <line x1="235" y1="180" x2="470" y2="180" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Timer countdown dotted line segment -->
  <line x1="260" y1="190" x2="460" y2="190" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="360" y="205" text-anchor="middle" font-family="Courier New,monospace" font-size="9" fill="#556b2f" font-weight="bold">TIMER COUNTDOWN</text>
  <!-- Auto release point -->
  <g transform="translate(470,180)"><circle cx="0" cy="0" r="5" fill="#556b2f"/></g>
  <line x1="470" y1="173" x2="470" y2="110" stroke="#556b2f" stroke-width="1"/>
  <text x="473" y="107" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">AUTO RELEASE</text>
  <text x="473" y="118" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">(TIMER = 0)</text>
  <!-- Bomb trajectory -->
  <path d="M 470 186 Q 485 250 498 305" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-r)"/>
  <ellipse cx="483" cy="240" rx="3" ry="5" fill="#8b0000" transform="rotate(10,483,240)"/>
  <!-- Egress -->
  <line x1="485" y1="180" x2="680" y2="130" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="655" y="118" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">EGRESS</text>
  <!-- Altitude annotation -->
  <line x1="80" y1="180" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="180" x2="85" y2="180" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="250" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,250)">3,000-10,000 FT AGL</text>
  <!-- NO ADI GUIDANCE note -->
  <g transform="translate(100,70)"><rect x="0" y="0" width="175" height="50" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/><text x="88" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">NO ADI GUIDANCE</text><text x="88" y="30" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f" font-weight="bold">PILOT MAINTAINS</text><text x="88" y="42" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f" font-weight="bold">LEVEL FLIGHT</text></g>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="12" x2="30" y2="12" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="26" x2="30" y2="26" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3"/><text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">BOMB TRAJECTORY</text><line x1="10" y1="38" x2="30" y2="38" stroke="#556b2f" stroke-width="1.5" stroke-dasharray="3,3"/><text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">TIMER SEGMENT</text></g>
  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>