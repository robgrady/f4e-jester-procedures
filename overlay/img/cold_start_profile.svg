<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="cs-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <pattern id="cs-gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">COLD START - STARTUP SEQUENCE</text>

  <!-- Ground / Ramp -->
  <rect x="0" y="260" width="750" height="120" fill="url(#cs-gh)" opacity="0.3"/>
  <line x1="0" y1="260" x2="750" y2="260" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="285" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">RAMP / PARKING</text>

  <!-- F-4E on ground (facing right) -->
  <g transform="translate(120,248)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1" transform="scale(2.5)"/>
  </g>
  <text x="120" y="230" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#3b4a20" font-weight="bold">F-4E</text>

  <!-- GPU Cart -->
  <g transform="translate(55,240)">
    <rect x="0" y="0" width="24" height="16" rx="2" fill="#6b5b3a" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="4" cy="18" r="3" fill="#4a3728" stroke="#1a1a1a" stroke-width="0.5"/>
    <circle cx="20" cy="18" r="3" fill="#4a3728" stroke="#1a1a1a" stroke-width="0.5"/>
    <text x="12" y="11" text-anchor="middle" font-family="Courier New,monospace" font-size="5" fill="#fff" font-weight="bold">GPU</text>
  </g>
  <!-- Power cable from GPU to aircraft -->
  <path d="M 79 248 Q 85 242 95 245" stroke="#4a5068" stroke-width="1.5" stroke-dasharray="3,2" fill="none"/>

  <!-- External Air hose to right engine -->
  <g transform="translate(165,245)">
    <path d="M 0 0 Q 10 -8 20 -5" stroke="#2f4f4f" stroke-width="2" stroke-dasharray="3,2" fill="none"/>
    <text x="25" y="-2" font-family="Courier New,monospace" font-size="6" fill="#2f4f4f" font-weight="bold">EXT AIR</text>
  </g>

  <!-- Timeline arrow -->
  <line x1="220" y1="170" x2="710" y2="170" stroke="#1a1a1a" stroke-width="2" marker-end="url(#cs-arr)"/>
  <text x="220" y="163" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">STARTUP SEQUENCE</text>

  <!-- Phase 1: ELECTRICAL -->
  <g transform="translate(230,178)">
    <rect x="0" y="0" width="100" height="18" rx="2" fill="#4a5068"/>
    <text x="50" y="13" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#fff" font-weight="bold">ELECTRICAL</text>
  </g>
  <line x1="280" y1="196" x2="280" y2="245" stroke="#4a5068" stroke-width="1" stroke-dasharray="3,2"/>
  <g transform="translate(235,205)">
    <text x="0" y="0" font-family="Courier New,monospace" font-size="7" fill="#4a5068">Battery ON</text>
    <text x="0" y="10" font-family="Courier New,monospace" font-size="7" fill="#4a5068">Ext Power ON</text>
    <text x="0" y="20" font-family="Courier New,monospace" font-size="7" fill="#4a5068">CB Panels CHK</text>
  </g>

  <!-- Phase 2: R ENGINE START -->
  <g transform="translate(340,178)">
    <rect x="0" y="0" width="100" height="18" rx="2" fill="#8b4513"/>
    <text x="50" y="13" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#fff" font-weight="bold">R ENGINE</text>
  </g>
  <line x1="390" y1="196" x2="390" y2="245" stroke="#8b4513" stroke-width="1" stroke-dasharray="3,2"/>
  <g transform="translate(345,205)">
    <text x="0" y="0" font-family="Courier New,monospace" font-size="7" fill="#8b4513">Ext Air → 10%</text>
    <text x="0" y="10" font-family="Courier New,monospace" font-size="7" fill="#8b4513">Ignition HOLD</text>
    <text x="0" y="20" font-family="Courier New,monospace" font-size="7" fill="#8b4513">Throttle IDLE</text>
    <text x="0" y="30" font-family="Courier New,monospace" font-size="7" fill="#8b4513">R Gen ON</text>
  </g>

  <!-- Phase 3: L ENGINE START -->
  <g transform="translate(450,178)">
    <rect x="0" y="0" width="100" height="18" rx="2" fill="#8b4513"/>
    <text x="50" y="13" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#fff" font-weight="bold">L ENGINE</text>
  </g>
  <line x1="500" y1="196" x2="500" y2="245" stroke="#8b4513" stroke-width="1" stroke-dasharray="3,2"/>
  <g transform="translate(455,205)">
    <text x="0" y="0" font-family="Courier New,monospace" font-size="7" fill="#8b4513">Repeat R seq</text>
    <text x="0" y="10" font-family="Courier New,monospace" font-size="7" fill="#8b4513">L Gen ON</text>
    <text x="0" y="20" font-family="Courier New,monospace" font-size="7" fill="#8b4513">Bus Tie CHK</text>
  </g>

  <!-- Phase 4: SYSTEMS CHECK -->
  <g transform="translate(560,178)">
    <rect x="0" y="0" width="100" height="18" rx="2" fill="#556b2f"/>
    <text x="50" y="13" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#fff" font-weight="bold">SYSTEMS CHK</text>
  </g>
  <line x1="610" y1="196" x2="610" y2="245" stroke="#556b2f" stroke-width="1" stroke-dasharray="3,2"/>
  <g transform="translate(565,205)">
    <text x="0" y="0" font-family="Courier New,monospace" font-size="7" fill="#556b2f">HYD Pressure</text>
    <text x="0" y="10" font-family="Courier New,monospace" font-size="7" fill="#556b2f">Flt Controls</text>
    <text x="0" y="20" font-family="Courier New,monospace" font-size="7" fill="#556b2f">Disc Ext Pwr</text>
  </g>

  <!-- TAXI READY label -->
  <g transform="translate(670,162)">
    <rect x="0" y="0" width="60" height="22" rx="2" fill="#6b5b3a"/>
    <text x="30" y="15" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#fff" font-weight="bold">TAXI</text>
  </g>

  <!-- Engine parameters box -->
  <g transform="translate(230,55)">
    <rect x="0" y="0" width="220" height="65" rx="2" fill="rgba(139,69,19,0.08)" stroke="#8b4513" stroke-width="1"/>
    <text x="110" y="15" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#8b4513" font-weight="bold">NORMAL IDLE PARAMETERS</text>
    <text x="10" y="28" font-family="Courier New,monospace" font-size="7" fill="#8b4513">EGT .............. 220-420°C</text>
    <text x="10" y="38" font-family="Courier New,monospace" font-size="7" fill="#8b4513">FUEL FLOW ........ 800-1400 pph</text>
    <text x="10" y="48" font-family="Courier New,monospace" font-size="7" fill="#8b4513">RPM .............. 65 ±1%</text>
    <text x="10" y="58" font-family="Courier New,monospace" font-size="7" fill="#8b4513">OIL PRESSURE ..... 12-50 PSI</text>
  </g>

  <!-- Safety checks box -->
  <g transform="translate(480,55)">
    <rect x="0" y="0" width="200" height="55" rx="2" fill="rgba(139,0,0,0.08)" stroke="#8b0000" stroke-width="1"/>
    <text x="100" y="15" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">PRE-START SAFETY</text>
    <text x="10" y="28" font-family="Courier New,monospace" font-size="7" fill="#8b0000">Seat Pins .... REMOVED</text>
    <text x="10" y="38" font-family="Courier New,monospace" font-size="7" fill="#8b0000">Master Arm ... SAFE</text>
    <text x="10" y="48" font-family="Courier New,monospace" font-size="7" fill="#8b0000">Fire Guard ... POSTED</text>
  </g>

  <!-- Timing annotation -->
  <g transform="translate(40,55)">
    <rect x="0" y="0" width="160" height="40" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/>
    <text x="80" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">~8-10 MIN TOTAL</text>
    <text x="80" y="30" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">Cockpit to Taxi Ready</text>
  </g>

  <!-- Legend -->
  <g transform="translate(580,305)">
    <rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/>
    <rect x="10" y="8" width="16" height="8" rx="1" fill="#4a5068"/>
    <text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#4a5068">ELECTRICAL</text>
    <rect x="10" y="20" width="16" height="8" rx="1" fill="#8b4513"/>
    <text x="35" y="27" font-family="Courier New,monospace" font-size="7.5" fill="#8b4513">ENGINE START</text>
    <rect x="10" y="32" width="16" height="8" rx="1" fill="#556b2f"/>
    <text x="35" y="39" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">SYSTEMS CHECK</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>
