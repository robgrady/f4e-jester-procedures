<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">CAGE / CAA - ACM ACQUISITION MODES</text>

  <!-- Dividing line between CAGE and CAA sections -->
  <line x1="375" y1="40" x2="375" y2="320" stroke="#b8956a" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- === LEFT SIDE: CAGE MODE === -->
  <text x="188" y="50" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="12" fill="#2f3f6f" letter-spacing="2">CAGE MODE</text>

  <!-- F-4E Aircraft (left section) -->
  <g transform="translate(120,190)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="120" y="215" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#3b4a20" font-weight="bold">F-4E</text>

  <!-- CAGE boresight cone (narrow, fixed) -->
  <path d="M 135 185 L 310 170" stroke="#2f3f6f" stroke-width="2" fill="none"/>
  <path d="M 135 195 L 310 210" stroke="#2f3f6f" stroke-width="2" fill="none"/>
  <!-- Cone fill -->
  <path d="M 135 185 L 310 170 L 310 210 L 135 195 Z" fill="#2f3f6f" opacity="0.08"/>
  <!-- Boresight crosshair at cone center -->
  <line x1="130" y1="190" x2="315" y2="190" stroke="#2f3f6f" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- 7.5 deg annotation -->
  <path d="M 175 185 A 20 20 0 0 1 175 195" stroke="#556b2f" stroke-width="1.5" fill="none"/>
  <text x="155" y="195" text-anchor="end" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f" font-weight="bold">7.5 DEG</text>

  <!-- Target in CAGE cone -->
  <g transform="translate(280,188) scale(-1,1)">
    <polygon points="-10,0 0,-4 10,0 0,2" fill="#8b0000" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  <text x="280" y="178" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000" font-weight="bold">TGT</text>

  <!-- Lock achieved indicator -->
  <rect x="260" y="175" width="40" height="28" rx="1" fill="none" stroke="#556b2f" stroke-width="2"/>
  <text x="280" y="220" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f" font-weight="bold">AUTO LOCK</text>

  <!-- CAGE description box -->
  <g transform="translate(50,250)">
    <rect x="0" y="0" width="280" height="55" rx="2" fill="rgba(47,63,111,0.08)" stroke="#2f3f6f" stroke-width="1"/>
    <text x="140" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f" font-weight="bold">FIXED BORESIGHT ACQUISITION</text>
    <text x="140" y="30" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#2f3f6f">Point nose at target</text>
    <text x="140" y="42" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#2f3f6f">Radar locks first target in cone</text>
  </g>

  <!-- Pilot maneuver arrow (turning nose to target) -->
  <path d="M 100 220 Q 85 250 100 260" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <text x="68" y="250" text-anchor="end" font-family="Courier New,monospace" font-size="7" fill="#1a1a1a" font-weight="bold">POINT</text>
  <text x="68" y="259" text-anchor="end" font-family="Courier New,monospace" font-size="7" fill="#1a1a1a" font-weight="bold">NOSE</text>

  <!-- === RIGHT SIDE: CAA MODE === -->
  <text x="562" y="50" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="12" fill="#2f3f6f" letter-spacing="2">CAA MODE</text>

  <!-- F-4E Aircraft (right section) -->
  <g transform="translate(480,190)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="480" y="215" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#3b4a20" font-weight="bold">F-4E</text>

  <!-- CAA vertical scan pattern -->
  <!-- Vertical scan bar -->
  <line x1="600" y1="80" x2="600" y2="280" stroke="#2f3f6f" stroke-width="2.5"/>
  <!-- Scan sweep arrows -->
  <line x1="595" y1="90" x2="605" y2="90" stroke="#2f3f6f" stroke-width="1.5"/>
  <line x1="595" y1="130" x2="605" y2="130" stroke="#2f3f6f" stroke-width="1.5"/>
  <line x1="595" y1="170" x2="605" y2="170" stroke="#2f3f6f" stroke-width="1.5"/>
  <line x1="595" y1="210" x2="605" y2="210" stroke="#2f3f6f" stroke-width="1.5"/>
  <line x1="595" y1="250" x2="605" y2="250" stroke="#2f3f6f" stroke-width="1.5"/>
  <line x1="595" y1="270" x2="605" y2="270" stroke="#2f3f6f" stroke-width="1.5"/>

  <!-- Scan cone from aircraft to scan bar -->
  <path d="M 495 185 L 595 80" stroke="#2f3f6f" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <path d="M 495 195 L 595 280" stroke="#2f3f6f" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <!-- Cone fill -->
  <path d="M 495 185 L 595 80 L 595 280 L 495 195 Z" fill="#2f3f6f" opacity="0.05"/>

  <!-- Vertical scan label -->
  <text x="620" y="170" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f" font-weight="bold">VERTICAL</text>
  <text x="620" y="180" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f" font-weight="bold">SCAN BAR</text>
  <text x="620" y="195" font-family="Courier New,monospace" font-size="7.5" fill="#2f3f6f">+/- 30 DEG</text>

  <!-- Target detected in scan -->
  <g transform="translate(590,130) scale(-1,1)">
    <polygon points="-10,0 0,-4 10,0 0,2" fill="#8b0000" stroke="#1a1a1a" stroke-width="0.8"/>
  </g>
  <!-- Lock box around target -->
  <rect x="573" y="118" width="34" height="24" rx="1" fill="none" stroke="#556b2f" stroke-width="2"/>
  <text x="590" y="112" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000" font-weight="bold">TGT</text>
  <text x="590" y="155" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f" font-weight="bold">AUTO LOCK</text>

  <!-- CAA description box -->
  <g transform="translate(405,250)">
    <rect x="0" y="0" width="280" height="55" rx="2" fill="rgba(47,63,111,0.08)" stroke="#2f3f6f" stroke-width="1"/>
    <text x="140" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f" font-weight="bold">COMPUTER AUTO ACQUISITION</text>
    <text x="140" y="30" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#2f3f6f">Vertical bar scan pattern</text>
    <text x="140" y="42" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#2f3f6f">Auto-locks first target detected</text>
  </g>

  <!-- Both transition to STT note -->
  <g transform="translate(275,330)">
    <rect x="0" y="0" width="200" height="28" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/>
    <text x="100" y="18" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">BOTH → STT ON LOCK</text>
  </g>

  <!-- Legend -->
  <g transform="translate(50,330)">
    <rect x="0" y="0" width="155" height="30" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/>
    <line x1="10" y1="10" x2="30" y2="10" stroke="#2f3f6f" stroke-width="2"/>
    <text x="35" y="13" font-family="Courier New,monospace" font-size="7.5" fill="#2f3f6f">SCAN PATTERN</text>
    <rect x="10" y="18" width="20" height="8" rx="1" fill="none" stroke="#556b2f" stroke-width="1.5"/>
    <text x="35" y="26" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">LOCK BOX</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>