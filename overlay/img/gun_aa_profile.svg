<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">M61 VULCAN GUN - A/A ENGAGEMENT PROFILE</text>

  <!-- Target aircraft (ahead and slightly above) -->
  <g transform="translate(480,140)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#8b0000" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="-8" y1="5" x2="8" y2="5" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="480" y="165" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="10" fill="#8b0000" letter-spacing="1">TARGET</text>

  <!-- F-4E Aircraft (gun tracking position, behind and below) -->
  <g transform="translate(220,200)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="220" y="225" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="10" fill="#3b4a20" letter-spacing="1">F-4E</text>

  <!-- BST Radar beam for range -->
  <line x1="235" y1="195" x2="465" y2="142" stroke="#2f3f6f" stroke-width="1.5" stroke-dasharray="5,3" fill="none"/>
  <text x="365" y="155" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f" font-weight="bold">BST RADAR</text>
  <text x="365" y="165" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f">(RANGE TO LCOS)</text>

  <!-- LCOS computed lead point (ahead of target) -->
  <g transform="translate(520,125)">
    <circle cx="0" cy="0" r="8" stroke="#556b2f" stroke-width="1.5" fill="none"/>
    <circle cx="0" cy="0" r="2" fill="#556b2f"/>
    <line x1="-12" y1="0" x2="12" y2="0" stroke="#556b2f" stroke-width="1"/>
    <line x1="0" y1="-12" x2="0" y2="12" stroke="#556b2f" stroke-width="1"/>
  </g>
  <line x1="530" y1="120" x2="575" y2="85" stroke="#556b2f" stroke-width="1"/>
  <text x="578" y="78" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">LCOS PIPPER</text>
  <text x="578" y="89" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">(COMPUTED LEAD)</text>

  <!-- Tracer stream from F-4E to target area -->
  <line x1="235" y1="197" x2="470" y2="142" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="2,4"/>
  <line x1="235" y1="199" x2="475" y2="140" stroke="#d4a017" stroke-width="1" stroke-dasharray="3,5"/>
  <line x1="235" y1="195" x2="468" y2="144" stroke="#d4a017" stroke-width="1" stroke-dasharray="2,6"/>
  <text x="340" y="195" font-family="Courier New,monospace" font-size="8" fill="#d4a017" font-weight="bold">20mm TRACER STREAM</text>

  <!-- Optimal gun range bracket -->
  <line x1="350" y1="260" x2="440" y2="260" stroke="#556b2f" stroke-width="2"/>
  <line x1="350" y1="255" x2="350" y2="265" stroke="#556b2f" stroke-width="2"/>
  <line x1="440" y1="255" x2="440" y2="265" stroke="#556b2f" stroke-width="2"/>
  <text x="395" y="278" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">OPTIMAL: 1,500-3,000 FT</text>

  <!-- Range line with distance markers -->
  <line x1="220" y1="300" x2="480" y2="300" stroke="#556b2f" stroke-width="1"/>
  <line x1="220" y1="296" x2="220" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="306" y1="296" x2="306" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="393" y1="296" x2="393" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="480" y1="296" x2="480" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <text x="220" y="316" text-anchor="middle" font-family="Courier New,monospace" font-size="7" fill="#556b2f">0 FT</text>
  <text x="306" y="316" text-anchor="middle" font-family="Courier New,monospace" font-size="7" fill="#556b2f">1,500 FT</text>
  <text x="393" y="316" text-anchor="middle" font-family="Courier New,monospace" font-size="7" fill="#556b2f">3,000 FT</text>
  <text x="480" y="316" text-anchor="middle" font-family="Courier New,monospace" font-size="7" fill="#556b2f">4,500 FT</text>

  <!-- Approach path -->
  <line x1="60" y1="240" x2="205" y2="205" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="80" y="252" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">CLOSE TO</text>
  <text x="80" y="262" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">GUN RANGE</text>

  <!-- Break off annotation -->
  <path d="M 245 200 Q 280 190 310 200 Q 340 220 350 240" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" fill="none" marker-end="url(#arr)"/>
  <text x="340" y="250" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">BREAK OFF</text>

  <!-- Gun specs box -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="170" height="65" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/>
    <text x="85" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">M61A1 VULCAN</text>
    <text x="85" y="30" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f">20mm x 6 barrels</text>
    <text x="85" y="42" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f">6,000 RPM (HIGH)</text>
    <text x="85" y="54" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f">639 rounds (~6 sec)</text>
  </g>

  <!-- Short bursts note -->
  <g transform="translate(520,240)">
    <rect x="0" y="0" width="155" height="40" rx="2" fill="rgba(139,0,0,0.08)" stroke="#8b0000" stroke-width="1"/>
    <text x="78" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#8b0000" font-weight="bold">SHORT BURSTS</text>
    <text x="78" y="30" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#8b0000">1-2 sec max</text>
  </g>

  <!-- Legend -->
  <g transform="translate(580,330)">
    <rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/>
    <line x1="10" y1="12" x2="30" y2="12" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="2,4"/>
    <text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#d4a017">TRACER STREAM</text>
    <line x1="10" y1="26" x2="30" y2="26" stroke="#2f3f6f" stroke-width="1.5" stroke-dasharray="5,3"/>
    <text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#2f3f6f">BST RADAR</text>
    <circle cx="20" cy="38" r="5" stroke="#556b2f" stroke-width="1" fill="none"/>
    <circle cx="20" cy="38" r="1.5" fill="#556b2f"/>
    <text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">LCOS PIPPER</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>