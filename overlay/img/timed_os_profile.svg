<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#556b2f"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">TIMED OVER-THE-SHOULDER (O/S) - ATTACK PROFILE</text>
  <!-- Ground -->
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- Target (behind the aircraft - rearward toss) -->
  <g transform="translate(230,295)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#8b0000" stroke-width="2"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#8b0000" stroke-width="2"/><circle cx="0" cy="0" r="8" stroke="#8b0000" stroke-width="1.5" fill="none"/><circle cx="0" cy="0" r="3" fill="#8b0000"/><text x="0" y="28" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="11" fill="#8b0000" letter-spacing="1">TARGET</text></g>
  <!-- Low level ingress from left -->
  <line x1="60" y1="275" x2="155" y2="275" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="70" y="262" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">LOW LEVEL INGRESS</text>
  <!-- IP marker -->
  <g transform="translate(180,310)">
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#556b2f" stroke-width="2"/>
    <polygon points="0,-25 18,-20 0,-15" fill="#556b2f" opacity="0.7" stroke="#556b2f" stroke-width="1"/>
    <text x="22" y="-16" font-family="Courier New,monospace" font-size="10" fill="#556b2f" font-weight="bold">IP</text>
  </g>
  <!-- Level flight from IP (timer countdown) -->
  <line x1="170" y1="275" x2="350" y2="275" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Timer annotation -->
  <text x="260" y="265" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">TIMER</text>
  <line x1="200" y1="270" x2="320" y2="270" stroke="#556b2f" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Pull-up point -->
  <g transform="translate(350,275)"><circle cx="0" cy="0" r="5" fill="#8b0000"/></g>
  <!-- 4G Immelmann arc - full loop going over the top -->
  <!-- Up phase -->
  <path d="M 355 275 Q 370 220 385 150 Q 400 80 410 55" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Over the top (Immelmann) -->
  <path d="M 410 55 Q 420 38 430 35 Q 450 32 460 40 Q 470 50 475 65" stroke="#1a1a1a" stroke-width="2.5" fill="none"/>
  <!-- Coming back down on reciprocal heading -->
  <path d="M 475 65 Q 485 100 490 130" stroke="#1a1a1a" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <!-- 4G IMMELMANN label -->
  <text x="440" y="28" text-anchor="middle" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">4G IMMELMANN</text>
  <!-- Release angle arc (>90 deg) -->
  <path d="M 380 275 A 80 80 0 0 0 430 45" stroke="#556b2f" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <text x="415" y="160" font-family="Courier New,monospace" font-size="9" fill="#556b2f" font-weight="bold">&gt;90 DEG</text>
  <!-- Release point on the loop (past vertical) -->
  <g transform="translate(430,48)"><circle cx="0" cy="0" r="5" fill="#556b2f"/></g>
  <line x1="435" y1="52" x2="500" y2="80" stroke="#556b2f" stroke-width="1"/>
  <text x="503" y="78" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">RELEASE</text>
  <!-- Bomb trajectory going REARWARD (back toward target) -->
  <path d="M 425 52 Q 380 70 320 130 Q 260 200 235 290" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-r)"/>
  <ellipse cx="350" cy="110" rx="3" ry="5" fill="#8b0000" transform="rotate(40,350,110)"/>
  <ellipse cx="280" cy="180" rx="3" ry="5" fill="#8b0000" transform="rotate(55,280,180)"/>
  <!-- Weapons toss rearward label -->
  <text x="280" y="125" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">WEAPONS TOSS</text>
  <text x="280" y="136" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">REARWARD</text>
  <!-- Aircraft on reciprocal heading (egress) -->
  <g transform="translate(490,135) rotate(80)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Egress on reciprocal heading -->
  <line x1="495" y1="150" x2="520" y2="275" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" fill="none" marker-end="url(#arr)"/>
  <text x="530" y="200" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">EGRESS</text>
  <text x="530" y="211" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">(RECIPROCAL</text>
  <text x="530" y="222" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold"> HEADING)</text>
  <!-- Altitude annotation -->
  <line x1="80" y1="275" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="275" x2="85" y2="275" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="297" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,297)">200-500 FT AGL</text>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="12" x2="30" y2="12" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="26" x2="30" y2="26" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3"/><text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">BOMB TRAJECTORY</text><line x1="10" y1="38" x2="30" y2="38" stroke="#556b2f" stroke-width="1.5"/><polygon points="10,38 18,34 10,40" fill="#556b2f"/><text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">IP MARKER</text></g>
  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>