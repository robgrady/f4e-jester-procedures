<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <marker id="arr-o" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#556b2f"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">LOFT (LO) - ATTACK PROFILE</text>
  <!-- Ground -->
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- Target (further right - stand-off) -->
  <g transform="translate(580,295)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#8b0000" stroke-width="2"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#8b0000" stroke-width="2"/><circle cx="0" cy="0" r="8" stroke="#8b0000" stroke-width="1.5" fill="none"/><circle cx="0" cy="0" r="3" fill="#8b0000"/><text x="0" y="28" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="11" fill="#8b0000" letter-spacing="1">TARGET</text></g>
  <!-- Low level ingress -->
  <line x1="60" y1="275" x2="170" y2="275" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="80" y="262" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">LOW LEVEL INGRESS</text>
  <!-- IP marker on ground -->
  <g transform="translate(200,310)">
    <line x1="0" y1="0" x2="0" y2="-25" stroke="#556b2f" stroke-width="2"/>
    <polygon points="0,-25 18,-20 0,-15" fill="#556b2f" opacity="0.7" stroke="#556b2f" stroke-width="1"/>
    <text x="22" y="-16" font-family="Courier New,monospace" font-size="10" fill="#556b2f" font-weight="bold">IP</text>
  </g>
  <!-- Level flight from IP (timer countdown) -->
  <line x1="185" y1="275" x2="330" y2="275" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Timer countdown annotation -->
  <text x="240" y="265" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">TIMER COUNTDOWN</text>
  <line x1="200" y1="270" x2="280" y2="270" stroke="#556b2f" stroke-width="1" stroke-dasharray="2,2"/>
  <!-- Aircraft at pull-up point -->
  <g transform="translate(330,270)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- 4G Pull-up annotation -->
  <g transform="translate(330,275)"><circle cx="0" cy="0" r="5" fill="#8b0000"/><line x1="-5" y1="-8" x2="-25" y2="-35" stroke="#8b0000" stroke-width="1"/><text x="-28" y="-38" font-family="Courier New,monospace" font-size="9" fill="#8b0000" font-weight="bold" text-anchor="end">4G PULL-UP</text></g>
  <!-- Pull-up arc (climbing steeply) -->
  <path d="M 335 275 Q 360 240 385 170 Q 400 120 420 90" stroke="#1a1a1a" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <!-- Release point on the arc (low angle) -->
  <g transform="translate(395,145)"><circle cx="0" cy="0" r="5" fill="#556b2f"/></g>
  <!-- Release angle arc -->
  <path d="M 360 275 A 100 100 0 0 0 393 153" stroke="#556b2f" stroke-width="1" fill="none" stroke-dasharray="4,3"/>
  <text x="345" y="200" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold" transform="rotate(-60,345,200)">LOW ANGLE</text>
  <!-- Release annotation -->
  <line x1="400" y1="145" x2="445" y2="130" stroke="#556b2f" stroke-width="1"/>
  <text x="448" y="125" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">RELEASE AT</text>
  <text x="448" y="136" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">LOW ANGLE</text>
  <!-- Bomb parabolic loft trajectory to target -->
  <path d="M 395 150 Q 450 60 520 100 Q 560 150 575 290" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-r)"/>
  <ellipse cx="450" cy="80" rx="3" ry="5" fill="#8b0000" transform="rotate(-30,450,80)"/>
  <ellipse cx="530" cy="120" rx="3" ry="5" fill="#8b0000" transform="rotate(30,530,120)"/>
  <!-- Loft trajectory label -->
  <text x="490" y="55" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#8b0000" font-weight="bold">BOMB LOFT ARC</text>
  <!-- Aircraft continues climbing -->
  <g transform="translate(418,85) rotate(-55)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Egress (continuing over the top or turning) -->
  <path d="M 425 82 Q 450 60 480 55 Q 530 50 580 70" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" fill="none" marker-end="url(#arr)"/>
  <text x="545" y="50" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">EGRESS</text>
  <!-- Altitude annotation -->
  <line x1="80" y1="275" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="275" x2="85" y2="275" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="297" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,297)">200-500 FT AGL</text>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="12" x2="30" y2="12" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="26" x2="30" y2="26" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3"/><text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">BOMB TRAJECTORY</text><line x1="10" y1="38" x2="30" y2="38" stroke="#556b2f" stroke-width="1.5"/><polygon points="10,38 18,34 10,40" fill="#556b2f"/><text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">IP MARKER</text></g>
  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>