<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">DIRECT (MANUAL) - ATTACK PROFILE</text>
  <!-- Ground -->
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- Target -->
  <g transform="translate(420,295)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#8b0000" stroke-width="2"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#8b0000" stroke-width="2"/><circle cx="0" cy="0" r="8" stroke="#8b0000" stroke-width="1.5" fill="none"/><circle cx="0" cy="0" r="3" fill="#8b0000"/><text x="0" y="28" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="11" fill="#8b0000" letter-spacing="1">TARGET</text></g>
  <!-- Ingress -->
  <line x1="60" y1="95" x2="200" y2="95" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="100" y="82" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">INGRESS</text>
  <!-- Aircraft at roll-in -->
  <g transform="translate(220,90)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Dive path -->
  <line x1="235" y1="95" x2="410" y2="260" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- Dive angle -->
  <path d="M 260 95 A 40 40 0 0 1 275 115" stroke="#556b2f" stroke-width="1.5" fill="none"/>
  <text x="285" y="115" font-family="Courier New,monospace" font-size="10" fill="#556b2f" font-weight="bold">20-45 DEG</text>
  <!-- Pipper on target annotation -->
  <g transform="translate(380,240)"><circle cx="0" cy="0" r="12" stroke="#556b2f" stroke-width="1.5" fill="none"/><line x1="-16" y1="0" x2="-6" y2="0" stroke="#556b2f" stroke-width="1.5"/><line x1="6" y1="0" x2="16" y2="0" stroke="#556b2f" stroke-width="1.5"/><line x1="0" y1="-16" x2="0" y2="-6" stroke="#556b2f" stroke-width="1.5"/><line x1="0" y1="6" x2="0" y2="16" stroke="#556b2f" stroke-width="1.5"/><circle cx="0" cy="0" r="2" fill="#556b2f"/></g>
  <line x1="395" y1="230" x2="460" y2="200" stroke="#556b2f" stroke-width="1"/>
  <text x="465" y="195" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">PIPPER ON TARGET</text>
  <text x="465" y="206" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">(MANUAL AIM)</text>
  <!-- Release point -->
  <g transform="translate(400,252)"><circle cx="0" cy="0" r="5" fill="#8b0000"/><line x1="8" y1="-3" x2="45" y2="-20" stroke="#8b0000" stroke-width="1"/><text x="48" y="-22" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">PRESS BOMB BUTTON</text><text x="48" y="-12" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">AT PLANNED ALT</text></g>
  <!-- Bomb trajectory -->
  <path d="M 400 258 Q 415 280 420 308" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-r)"/>
  <ellipse cx="410" cy="278" rx="3" ry="5" fill="#8b0000" transform="rotate(10,410,278)"/>
  <!-- Pullout -->
  <path d="M 410 260 Q 450 290 490 250 Q 520 220 550 200" stroke="#1a1a1a" stroke-width="2.5" fill="none" marker-end="url(#arr)"/>
  <text x="500" y="235" font-family="Courier New,monospace" font-size="8.5" fill="#1a1a1a" font-weight="bold">PULLOUT</text>
  <!-- Egress -->
  <line x1="565" y1="195" x2="680" y2="140" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="660" y="128" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">EGRESS</text>
  <!-- Altitude -->
  <line x1="80" y1="95" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="95" x2="85" y2="95" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="205" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,205)">8,000-12,000 FT AGL</text>
  <!-- Sight depression note -->
  <g transform="translate(130,180)"><rect x="0" y="0" width="130" height="40" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/><text x="65" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f" font-weight="bold">SIGHT DEPRESSION</text><text x="65" y="28" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f" font-weight="bold">SET FROM TABLES</text></g>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="30" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="10" x2="30" y2="10" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="13" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="22" x2="30" y2="22" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3"/><text x="35" y="25" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">BOMB TRAJECTORY</text></g>
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>
