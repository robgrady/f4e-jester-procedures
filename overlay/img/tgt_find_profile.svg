<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <pattern id="gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">TARGET FIND (TGT FIND) - ATTACK PROFILE</text>
  <rect x="0" y="310" width="750" height="70" fill="url(#gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>
  <text x="25" y="335" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">TERRAIN</text>
  <!-- Target -->
  <g transform="translate(450,295)"><line x1="-12" y1="0" x2="12" y2="0" stroke="#8b0000" stroke-width="2"/><line x1="0" y1="-12" x2="0" y2="12" stroke="#8b0000" stroke-width="2"/><circle cx="0" cy="0" r="8" stroke="#8b0000" stroke-width="1.5" fill="none"/><circle cx="0" cy="0" r="3" fill="#8b0000"/><text x="0" y="28" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="11" fill="#8b0000" letter-spacing="1">TARGET</text></g>
  <!-- Level flight path -->
  <line x1="60" y1="140" x2="350" y2="140" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="120" y="127" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">INGRESS (LEVEL)</text>
  <!-- Aircraft -->
  <g transform="translate(370,135)"><polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/></g>
  <!-- Pave Spike pod LOS -->
  <line x1="370" y1="145" x2="450" y2="290" stroke="#2f4f4f" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="360,148 370,145 380,148 450,290 440,290" fill="rgba(47,79,79,0.08)" stroke="none"/>
  <text x="425" y="220" font-family="Courier New,monospace" font-size="8.5" fill="#2f4f4f" font-weight="bold" transform="rotate(62,425,220)">PAVE SPIKE LOS</text>
  <!-- Laser beam -->
  <line x1="370" y1="148" x2="450" y2="292" stroke="#8b0000" stroke-width="1" stroke-dasharray="2,2"/>
  <g transform="translate(470,250)"><text x="0" y="0" font-family="Courier New,monospace" font-size="8" fill="#8b0000" font-weight="bold">LASER</text><text x="0" y="10" font-family="Courier New,monospace" font-size="8" fill="#8b0000" font-weight="bold">ACTIVE</text></g>
  <!-- Bomb button press -->
  <g transform="translate(400,140)"><circle cx="0" cy="0" r="5" fill="#8b0000"/><line x1="5" y1="-5" x2="40" y2="-30" stroke="#8b0000" stroke-width="1"/><text x="43" y="-32" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">PRESS &amp; HOLD</text><text x="43" y="-22" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">BOMB BUTTON</text></g>
  <!-- Continued flight to release -->
  <line x1="385" y1="140" x2="520" y2="140" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#arr)"/>
  <!-- HUD steering box -->
  <g transform="translate(460,100)"><rect x="-52" y="-14" width="104" height="28" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/><text x="0" y="-2" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f" font-weight="bold">STEERING CUES</text><text x="0" y="9" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#556b2f" font-weight="bold">ON HUD</text></g>
  <!-- Auto release -->
  <g transform="translate(500,140)"><circle cx="0" cy="0" r="5" fill="#556b2f"/><line x1="5" y1="5" x2="35" y2="25" stroke="#556b2f" stroke-width="1"/><text x="38" y="23" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">AUTO RELEASE</text><text x="38" y="33" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">(WRCS COMPUTED)</text></g>
  <!-- Bomb trajectory -->
  <path d="M 500 148 Q 510 220 460 305" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3" fill="none" marker-end="url(#arr-r)"/>
  <ellipse cx="505" cy="200" rx="3" ry="5" fill="#8b0000" transform="rotate(-10,505,200)"/>
  <!-- Egress -->
  <line x1="535" y1="140" x2="680" y2="140" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#arr)"/>
  <text x="640" y="127" font-family="Courier New,monospace" font-size="9" fill="#1a1a1a" font-weight="bold">EGRESS</text>
  <!-- Altitude -->
  <line x1="80" y1="140" x2="80" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="75" y1="140" x2="85" y2="140" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="75" y1="310" x2="85" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="72" y="225" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,72,225)">8,000-15,000 FT AGL</text>
  <!-- Pave Spike note -->
  <g transform="translate(100,250)"><rect x="0" y="0" width="165" height="40" rx="2" fill="rgba(47,79,79,0.08)" stroke="#2f4f4f" stroke-width="1"/><text x="82" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#2f4f4f" font-weight="bold">REQUIRES PAVE SPIKE</text><text x="82" y="28" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#2f4f4f" font-weight="bold">TARGETING POD</text></g>
  <!-- Legend -->
  <g transform="translate(580,330)"><rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/><line x1="10" y1="12" x2="30" y2="12" stroke="#1a1a1a" stroke-width="2"/><text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text><line x1="10" y1="26" x2="30" y2="26" stroke="#8b0000" stroke-width="2" stroke-dasharray="5,3"/><text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">BOMB TRAJECTORY</text><line x1="10" y1="38" x2="30" y2="38" stroke="#2f4f4f" stroke-width="2" stroke-dasharray="6,3"/><text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#2f4f4f">PAVE SPIKE LOS</text></g>
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>
