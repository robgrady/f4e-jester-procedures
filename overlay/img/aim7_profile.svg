<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="arr-r" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#8b0000"/></marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#2f3f6f"/></marker>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">AIM-7 SPARROW - BVR INTERCEPT PROFILE</text>

  <!-- F-4E Aircraft (left side) -->
  <g transform="translate(120,190)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/>
  </g>
  <text x="120" y="215" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="10" fill="#3b4a20" letter-spacing="1">F-4E</text>

  <!-- Radar beam cone from aircraft -->
  <path d="M 135 185 L 380 140" stroke="#2f3f6f" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <path d="M 135 195 L 380 240" stroke="#2f3f6f" stroke-width="1.5" stroke-dasharray="4,2" fill="none"/>
  <!-- Radar scan lines within cone -->
  <line x1="200" y1="175" x2="200" y2="207" stroke="#2f3f6f" stroke-width="0.8" stroke-dasharray="2,3"/>
  <line x1="250" y1="167" x2="250" y2="215" stroke="#2f3f6f" stroke-width="0.8" stroke-dasharray="2,3"/>
  <line x1="300" y1="158" x2="300" y2="224" stroke="#2f3f6f" stroke-width="0.8" stroke-dasharray="2,3"/>
  <line x1="350" y1="148" x2="350" y2="234" stroke="#2f3f6f" stroke-width="0.8" stroke-dasharray="2,3"/>

  <!-- Radar cone label -->
  <text x="240" y="155" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f" font-weight="bold">RADAR SEARCH</text>
  <text x="240" y="165" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f" font-weight="bold">CONE (RDR)</text>

  <!-- Target aircraft (right side) -->
  <g transform="translate(580,190) scale(-1,1)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#8b0000" stroke="#1a1a1a" stroke-width="1"/>
    <line x1="-8" y1="5" x2="8" y2="5" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
  <text x="580" y="215" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="10" fill="#8b0000" letter-spacing="1">BOGEY</text>

  <!-- CW Illumination beam (solid line from F-4E to target) -->
  <line x1="135" y1="190" x2="565" y2="190" stroke="#8b0000" stroke-width="2" stroke-dasharray="8,3"/>
  <text x="350" y="255" text-anchor="middle" font-family="Courier New,monospace" font-size="9" fill="#8b0000" font-weight="bold">CW ILLUMINATION (MUST MAINTAIN)</text>

  <!-- AIM-7 missile trajectory -->
  <path d="M 140 192 Q 300 175 560 190" stroke="#8b0000" stroke-width="2.5" fill="none" marker-end="url(#arr-r)"/>
  <!-- Missile symbol -->
  <g transform="translate(350,182)">
    <polygon points="-8,0 8,0 6,-2 -6,-2" fill="#8b0000"/>
    <polygon points="8,0 12,-3 12,3" fill="#8b0000"/>
  </g>
  <text x="350" y="178" text-anchor="middle" font-family="Courier New,monospace" font-size="9" fill="#8b0000" font-weight="bold">AIM-7 FLIGHT PATH</text>

  <!-- Range markers along bottom -->
  <line x1="120" y1="300" x2="580" y2="300" stroke="#556b2f" stroke-width="1"/>
  <!-- Range tick marks -->
  <line x1="120" y1="296" x2="120" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="235" y1="296" x2="235" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="350" y1="296" x2="350" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="465" y1="296" x2="465" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="580" y1="296" x2="580" y2="304" stroke="#556b2f" stroke-width="1.5"/>
  <text x="120" y="318" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">0 NM</text>
  <text x="235" y="318" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">5 NM</text>
  <text x="350" y="318" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">10 NM</text>
  <text x="465" y="318" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">15 NM</text>
  <text x="580" y="318" text-anchor="middle" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">20 NM</text>

  <!-- Lock point annotation -->
  <g transform="translate(380,190)">
    <circle cx="0" cy="0" r="5" fill="#556b2f"/>
  </g>
  <line x1="385" y1="186" x2="430" y2="130" stroke="#556b2f" stroke-width="1"/>
  <text x="433" y="120" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">RADAR LOCK</text>
  <text x="433" y="131" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">(STT)</text>

  <!-- ASE circle on ADI notation -->
  <g transform="translate(60,60)">
    <rect x="0" y="0" width="160" height="50" rx="2" fill="rgba(47,63,111,0.1)" stroke="#2f3f6f" stroke-width="1"/>
    <text x="80" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#2f3f6f" font-weight="bold">ASE CIRCLE ON ADI</text>
    <text x="80" y="30" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f">Center dot in circle</text>
    <text x="80" y="42" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#2f3f6f">for valid shot</text>
  </g>

  <!-- IN RANGE annotation -->
  <g transform="translate(430,50)">
    <rect x="0" y="0" width="140" height="40" rx="2" fill="rgba(139,0,0,0.1)" stroke="#8b0000" stroke-width="1"/>
    <text x="70" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">IN RANGE LAMP</text>
    <text x="70" y="30" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#8b0000">Verify shoot cues</text>
  </g>

  <!-- Min range annotation -->
  <line x1="465" y1="270" x2="465" y2="290" stroke="#8b0000" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="465" y="282" text-anchor="middle" font-family="Courier New,monospace" font-size="7" fill="#8b0000" font-weight="bold">MIN RNG ~1.5 NM</text>

  <!-- Legend -->
  <g transform="translate(580,330)">
    <rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/>
    <line x1="10" y1="12" x2="30" y2="12" stroke="#8b0000" stroke-width="2.5"/>
    <text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">MISSILE PATH</text>
    <line x1="10" y1="26" x2="30" y2="26" stroke="#8b0000" stroke-width="2" stroke-dasharray="8,3"/>
    <text x="35" y="29" font-family="Courier New,monospace" font-size="7.5" fill="#8b0000">CW ILLUMINATION</text>
    <line x1="10" y1="38" x2="30" y2="38" stroke="#2f3f6f" stroke-width="1.5" stroke-dasharray="4,2"/>
    <text x="35" y="41" font-family="Courier New,monospace" font-size="7.5" fill="#2f3f6f">RADAR BEAM</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>