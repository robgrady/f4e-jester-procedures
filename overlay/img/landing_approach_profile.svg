<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380" width="750" height="380">
  <defs>
    <marker id="la-arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1a1a1a"/></marker>
    <marker id="la-arr-g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#556b2f"/></marker>
    <pattern id="la-gh" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)"><line x1="0" y1="0" x2="0" y2="8" stroke="#b8956a" stroke-width="1"/></pattern>
  </defs>
  <rect width="750" height="380" fill="#f5f0e1" rx="2"/>
  <text x="375" y="22" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="14" fill="#3b4a20" letter-spacing="3">LANDING &amp; APPROACH - PROFILE</text>

  <!-- Ground / Runway -->
  <rect x="0" y="310" width="750" height="70" fill="url(#la-gh)" opacity="0.3"/>
  <line x1="0" y1="310" x2="750" y2="310" stroke="#5c4033" stroke-width="2"/>

  <!-- Runway -->
  <rect x="510" y="306" width="230" height="8" fill="#4a3728" opacity="0.6"/>
  <line x1="520" y1="310" x2="730" y2="310" stroke="#f5f0e1" stroke-width="1" stroke-dasharray="12,8"/>
  <!-- Threshold markings -->
  <line x1="515" y1="307" x2="515" y2="313" stroke="#f5f0e1" stroke-width="1.5"/>
  <line x1="520" y1="307" x2="520" y2="313" stroke="#f5f0e1" stroke-width="1.5"/>
  <line x1="525" y1="307" x2="525" y2="313" stroke="#f5f0e1" stroke-width="1.5"/>
  <text x="625" y="335" text-anchor="middle" font-family="Courier New,monospace" font-size="9" fill="#5c4033" letter-spacing="1">RUNWAY</text>

  <!-- Touchdown zone -->
  <g transform="translate(555,295)">
    <line x1="-8" y1="0" x2="8" y2="0" stroke="#8b0000" stroke-width="1.5"/>
    <line x1="0" y1="-8" x2="0" y2="8" stroke="#8b0000" stroke-width="1.5"/>
    <text x="0" y="-12" text-anchor="middle" font-family="Courier New,monospace" font-size="7" fill="#8b0000" font-weight="bold">TDZ</text>
  </g>

  <!-- Pattern entry - overhead break (from left at pattern altitude) -->
  <line x1="60" y1="130" x2="200" y2="130" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#la-arr)"/>
  <text x="80" y="120" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">INITIAL (300-350 KTS)</text>

  <!-- Aircraft at break point -->
  <g transform="translate(215,125)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <!-- Break point marker -->
  <g transform="translate(215,130)">
    <circle cx="0" cy="0" r="4" fill="#8b0000"/>
    <line x1="5" y1="-8" x2="40" y2="-30" stroke="#8b0000" stroke-width="1"/>
    <text x="43" y="-32" font-family="Courier New,monospace" font-size="8" fill="#8b0000" font-weight="bold">OVERHEAD BREAK</text>
  </g>

  <!-- Break turn (conceptual arc showing turn to downwind) -->
  <path d="M 225 130 Q 260 120 280 130 Q 310 145 310 165" stroke="#1a1a1a" stroke-width="2" fill="none" marker-end="url(#la-arr)"/>
  <text x="290" y="118" font-family="Courier New,monospace" font-size="7" fill="#1a1a1a" font-weight="bold">BREAK TURN</text>

  <!-- Downwind leg (parallel to runway, slightly below pattern alt) -->
  <line x1="310" y1="170" x2="310" y2="210" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="8,4" marker-end="url(#la-arr)"/>
  <text x="320" y="185" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">DOWNWIND</text>
  <text x="320" y="195" font-family="Courier New,monospace" font-size="7" fill="#556b2f">Gear DN / Flaps OUT&amp;DN</text>

  <!-- Base turn -->
  <path d="M 310 215 Q 320 240 350 250 Q 390 260 420 255" stroke="#1a1a1a" stroke-width="2" fill="none" marker-end="url(#la-arr)"/>
  <text x="335" y="238" font-family="Courier New,monospace" font-size="7" fill="#1a1a1a" font-weight="bold">BASE</text>

  <!-- Final approach (descending glidepath) -->
  <line x1="425" y1="253" x2="550" y2="305" stroke="#1a1a1a" stroke-width="2.5" marker-end="url(#la-arr)"/>

  <!-- Aircraft on final -->
  <g transform="translate(460,268) rotate(12)">
    <polygon points="-15,0 0,-5 15,0 0,3" fill="#3b4a20" stroke="#1a1a1a" stroke-width="1"/>
  </g>

  <text x="475" y="245" font-family="Courier New,monospace" font-size="8" fill="#1a1a1a" font-weight="bold">FINAL</text>

  <!-- Glideslope angle annotation -->
  <line x1="430" y1="253" x2="530" y2="253" stroke="#556b2f" stroke-width="0.5" stroke-dasharray="3,2"/>
  <path d="M 475 253 A 45 45 0 0 1 472 265" stroke="#556b2f" stroke-width="1" fill="none"/>
  <text x="498" y="262" font-family="Courier New,monospace" font-size="7" fill="#556b2f" font-weight="bold">2.5-3°</text>

  <!-- Pattern altitude annotation -->
  <line x1="100" y1="130" x2="100" y2="310" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="95" y1="130" x2="105" y2="130" stroke="#556b2f" stroke-width="1.5"/>
  <line x1="95" y1="310" x2="105" y2="310" stroke="#556b2f" stroke-width="1.5"/>
  <text x="92" y="220" text-anchor="end" font-family="Courier New,monospace" font-size="9" fill="#556b2f" transform="rotate(-90,92,220)">~1,500 FT AGL</text>

  <!-- AoA Indexer box -->
  <g transform="translate(530,45)">
    <rect x="0" y="0" width="185" height="80" rx="2" fill="rgba(139,0,0,0.08)" stroke="#8b0000" stroke-width="1"/>
    <text x="92" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#8b0000" font-weight="bold">AOA INDEXER</text>
    <!-- Chevron up (too slow) -->
    <polygon points="25,30 35,22 45,30" fill="none" stroke="#8b0000" stroke-width="1.5"/>
    <text x="55" y="30" font-family="Courier New,monospace" font-size="7" fill="#8b0000">HIGH PITCH PULSE = TOO SLOW</text>
    <!-- Circle (on-speed) -->
    <circle cx="35" cy="44" r="6" fill="#556b2f" opacity="0.8"/>
    <text x="55" y="47" font-family="Courier New,monospace" font-size="7" fill="#556b2f" font-weight="bold">STEADY TONE = ON SPEED (19.2)</text>
    <!-- Chevron down (too fast) -->
    <polygon points="25,58 35,66 45,58" fill="none" stroke="#2f3f6f" stroke-width="1.5"/>
    <text x="55" y="63" font-family="Courier New,monospace" font-size="7" fill="#2f3f6f">LOW PITCH PULSE = TOO FAST</text>
    <text x="92" y="76" text-anchor="middle" font-family="Courier New,monospace" font-size="6.5" fill="#8b0000" font-style="italic">1 AoA unit ≈ 0.95 degrees</text>
  </g>

  <!-- Approach config box -->
  <g transform="translate(40,45)">
    <rect x="0" y="0" width="220" height="70" rx="2" fill="rgba(85,107,47,0.1)" stroke="#556b2f" stroke-width="1"/>
    <text x="110" y="16" text-anchor="middle" font-family="Courier New,monospace" font-size="8.5" fill="#556b2f" font-weight="bold">APPROACH CONFIG</text>
    <text x="10" y="30" font-family="Courier New,monospace" font-size="7" fill="#556b2f">AOA ............. 19.2 units</text>
    <text x="10" y="40" font-family="Courier New,monospace" font-size="7" fill="#556b2f">SPEED ........... ~145 KIAS</text>
    <text x="10" y="50" font-family="Courier New,monospace" font-size="7" fill="#556b2f">GLIDESLOPE ...... 2.5-3°</text>
    <text x="10" y="60" font-family="Courier New,monospace" font-size="7" fill="#556b2f">DESCENT ......... ~700 fpm</text>
  </g>

  <!-- Five-item check box -->
  <g transform="translate(290,45)">
    <rect x="0" y="0" width="210" height="55" rx="2" fill="rgba(139,0,0,0.08)" stroke="#8b0000" stroke-width="1"/>
    <text x="105" y="15" text-anchor="middle" font-family="Courier New,monospace" font-size="8" fill="#8b0000" font-weight="bold">FIVE-ITEM CHECK</text>
    <text x="10" y="28" font-family="Courier New,monospace" font-size="7" fill="#8b0000">1. GEAR        2. FLAPS</text>
    <text x="10" y="38" font-family="Courier New,monospace" font-size="7" fill="#8b0000">3. HYD PRESS   4. WARNING LIGHTS</text>
    <text x="10" y="48" font-family="Courier New,monospace" font-size="7" fill="#8b0000">5. ANTI-SKID</text>
  </g>

  <!-- Descent rate at final -->
  <text x="500" y="292" font-family="Courier New,monospace" font-size="7" fill="#556b2f" font-weight="bold">~700 FPM</text>

  <!-- Egress / go-around annotation -->
  <path d="M 540 300 Q 560 280 590 260 Q 620 240 660 230" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,4" fill="none" marker-end="url(#la-arr)"/>
  <text x="640" y="222" font-family="Courier New,monospace" font-size="7" fill="#1a1a1a" font-weight="bold">GO-AROUND</text>
  <text x="640" y="232" font-family="Courier New,monospace" font-size="7" fill="#1a1a1a">(MIL/AB PWR)</text>

  <!-- Legend -->
  <g transform="translate(580,330)">
    <rect x="0" y="0" width="155" height="42" rx="2" fill="#f5f0e1" stroke="#b8956a" stroke-width="1"/>
    <line x1="10" y1="12" x2="30" y2="12" stroke="#1a1a1a" stroke-width="2"/>
    <text x="35" y="15" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">FLIGHT PATH</text>
    <line x1="10" y1="24" x2="30" y2="24" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6,4"/>
    <text x="35" y="27" font-family="Courier New,monospace" font-size="7.5" fill="#1a1a1a">GO-AROUND</text>
    <line x1="10" y1="36" x2="30" y2="36" stroke="#556b2f" stroke-width="1" stroke-dasharray="4,3"/>
    <text x="35" y="39" font-family="Courier New,monospace" font-size="7.5" fill="#556b2f">GLIDESLOPE REF</text>
  </g>

  <!-- Border -->
  <rect x="1" y="1" width="748" height="378" rx="2" fill="none" stroke="#b8956a" stroke-width="2"/>
</svg>
